<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('每日复盘提醒', ~{::section})}">
<section>
    <h1 class="h3 mb-3">每日复盘提醒</h1>
    <div class="row g-3">
        <div class="col-lg-5">
            <div class="panel">
                <form method="post" th:action="@{/reminders/config}" class="vstack gap-3">
                    <label class="form-check"><input class="form-check-input" type="checkbox" name="enabled" th:checked="${enabled == '1'}"> 启用提醒</label>
                    <div><label class="form-label">提醒时间</label><input class="form-control" type="time" name="time" th:value="${time}"></div>
                    <button class="btn btn-primary">保存配置</button>
                </form>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="panel">
                <h2 class="h5">今日复盘</h2>
                <div th:if="${todayLog != null}" class="alert alert-success">今日已完成</div>
                <form method="post" th:action="@{/reminders/done}" class="vstack gap-2">
                    <textarea class="form-control" name="notes" rows="4" placeholder="复盘备注"></textarea>
                    <button class="btn btn-outline-primary">标记今日完成</button>
                </form>
            </div>
        </div>
    </div>
</section>
</html>
