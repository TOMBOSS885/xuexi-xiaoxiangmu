<!doctype html>
<html lang="zh-CN" th:fragment="layout (pageTitle, content)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' - INTP Study Manager'">INTP Study Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="app-shell d-flex">
    <aside class="sidebar p-3">
        <div class="fw-bold fs-5 mb-3">INTP Study Manager</div>
        <nav class="d-grid gap-1">
            <a th:href="@{/}">首页 Dashboard</a>
            <a th:href="@{/ppt-tutor}">PPT 逐页讲解</a>
            <a th:href="@{/ppt-management}">PPT 与插问管理</a>
            <a th:href="@{/reminders}">每日复盘提醒</a>
            <a th:href="@{/api-settings}">API 接入设置</a>
            <a th:href="@{/study-sessions}">学习登记</a>
            <a th:href="@{/knowledge-cards}">知识点卡片</a>
            <a th:href="@{/quiz-prompts}">闭卷测试 Prompt</a>
            <a th:href="@{/reviews}">复习计划</a>
            <a th:href="@{/parking-lot}">探索停车场</a>
            <a th:href="@{/mainline-branches}">主线与插问</a>
            <a th:href="@{/mistakes}">错因本</a>
        </nav>
    </aside>
    <main class="content flex-grow-1 p-4">
        <div class="container-fluid">
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:replace="${content}"></div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
