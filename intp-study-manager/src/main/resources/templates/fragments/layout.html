<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' · INTP Study Manager'">INTP Study Manager</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body>
<aside class="sidebar" th:fragment="sidebar(active)">
    <div class="brand">
        <span class="brand-mark">I</span>
        <div>
            <strong>INTP Study</strong>
            <small>知识主线管理</small>
        </div>
    </div>
    <nav class="nav-list">
        <a th:classappend="${active == 'dashboard'} ? 'active'" th:href="@{/dashboard}">首页 Dashboard</a>
        <a th:classappend="${active == 'study-sessions'} ? 'active'" th:href="@{/study-sessions}">学习登记</a>
        <a th:classappend="${active == 'knowledge-cards'} ? 'active'" th:href="@{/knowledge-cards}">知识点卡片</a>
        <a th:classappend="${active == 'reviews'} ? 'active'" th:href="@{/reviews}">复习计划</a>
        <a th:classappend="${active == 'ppt-tutor'} ? 'active'" th:href="@{/ppt-tutor}">PPT 逐页讲解</a>
        <a th:classappend="${active == 'ppt-management'} ? 'active'" th:href="@{/ppt-management}">PPT 与插问管理</a>
        <a th:classappend="${active == 'mainline-branches'} ? 'active'" th:href="@{/mainline-branches}">主线与插问</a>
        <a th:classappend="${active == 'mistakes'} ? 'active'" th:href="@{/mistakes}">错因本</a>
        <a th:classappend="${active == 'parking-lot'} ? 'active'" th:href="@{/parking-lot}">探索停车场</a>
        <a th:classappend="${active == 'reminders'} ? 'active'" th:href="@{/reminders}">每日复盘提醒</a>
        <a th:classappend="${active == 'quiz-prompts'} ? 'active'" th:href="@{/quiz-prompts}">闭卷测试 Prompt</a>
        <a th:classappend="${active == 'api-settings'} ? 'active'" th:href="@{/api-settings}">API 接入设置</a>
    </nav>
</aside>

<header class="topbar" th:fragment="topbar(pageTitle)">
    <div>
        <p class="eyebrow" th:text="${today}">2026-05-21</p>
        <h1 th:text="${pageTitle}">页面标题</h1>
    </div>
    <div class="topbar-actions">
        <a class="ghost-button" th:href="@{/study-sessions}">登记学习</a>
        <a class="primary-button" th:href="@{/reviews}">今日复习</a>
    </div>
</header>

<div class="flash-stack" th:fragment="flash">
    <div class="flash success" th:if="${success}" th:text="${success}">保存成功</div>
    <div class="flash error" th:if="${error}" th:text="${error}">保存失败</div>
    <pre class="flash note" th:if="${testPrompt}" th:text="${testPrompt}">Prompt</pre>
</div>
</body>
</html>
