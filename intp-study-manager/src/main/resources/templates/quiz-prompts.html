<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('闭卷测试 Prompt', ~{::section})}">
<section>
    <h1 class="h3 mb-3">闭卷测试 Prompt</h1>
    <div class="row g-3">
        <div class="col-lg-6">
            <div class="panel">
                <h2 class="h5">学习记录素材</h2>
                <pre class="text-pre">请根据以下学习记录设计 5 道闭卷自测题，要求覆盖核心问题、易混点和迁移应用。</pre>
                <div th:each="r : ${records}" class="border-bottom py-2">
                    <strong th:text="|${r['subject']} · ${r['title']}|"></strong>
                    <div class="text-pre small" th:text="${r['main_question']}"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="panel">
                <h2 class="h5">知识卡片素材</h2>
                <pre class="text-pre">请基于以下知识卡片生成闭卷回忆题，并给出参考评分要点。</pre>
                <div th:each="c : ${cards}" class="border-bottom py-2">
                    <strong th:text="|${c['subject']} · ${c['topic']} · ${c['mastery']}%|"></strong>
                    <div class="text-pre small" th:text="${c['core_question']}"></div>
                    <div class="text-pre small" th:text="${c['one_sentence']}"></div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
