<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('主线与插问', ~{::section})}">
<section>
    <h1 class="h3 mb-3">主线与插问</h1>
    <div class="row g-3">
        <div class="col-lg-6">
            <div class="panel">
                <h2 class="h5">主线锚点</h2>
                <form method="post" th:action="@{/mainline-anchors}" class="vstack gap-2 mb-3">
                    <select class="form-select" name="sessionId"><option th:each="s : ${sessions}" th:value="${s['id']}" th:text="|${s['date']} · ${s['subject']} · ${s['title']}|"></option></select>
                    <input class="form-control" name="anchorCode" placeholder="锚点编号">
                    <input class="form-control" name="title" placeholder="标题">
                    <textarea class="form-control" name="content" rows="3" placeholder="主线内容"></textarea>
                    <input class="form-control" type="number" name="orderIndex" value="0">
                    <button class="btn btn-primary">保存锚点</button>
                </form>
                <div th:each="a : ${anchors}" class="border-bottom py-2">
                    <strong th:text="|${a['anchor_code']} · ${a['title']}|"></strong>
                    <div class="small text-secondary" th:text="|${a['subject']} · ${a['session_title']}|"></div>
                    <div class="text-pre" th:text="${a['content']}"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="panel">
                <h2 class="h5">插问</h2>
                <form method="post" th:action="@{/branch-questions}" class="vstack gap-2 mb-3">
                    <select class="form-select" name="anchorId"><option th:each="a : ${anchors}" th:value="${a['id']}" th:text="|${a['anchor_code']} · ${a['title']}|"></option></select>
                    <textarea class="form-control" name="question" rows="2" placeholder="插问"></textarea>
                    <textarea class="form-control" name="answerSummary" rows="3" placeholder="回答摘要"></textarea>
                    <label class="form-check"><input class="form-check-input" type="checkbox" name="understood"> 已理解</label>
                    <label class="form-check"><input class="form-check-input" type="checkbox" name="needReview" checked> 需要复习</label>
                    <button class="btn btn-primary">保存插问</button>
                </form>
                <div th:each="b : ${branches}" class="border-bottom py-2">
                    <strong th:text="${b['question']}"></strong>
                    <div class="small text-secondary" th:text="|${b['anchor_code']} · ${b['anchor_title']}|"></div>
                    <div class="text-pre" th:text="${b['answer_summary']}"></div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
