<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('API 接入设置', ~{::section})}">
<section>
    <h1 class="h3 mb-3">API 接入设置</h1>
    <div class="row g-3">
        <div class="col-lg-8">
            <div class="panel">
                <h2 class="h5">当前 Provider</h2>
                <table class="table table-sm table-hover">
                    <thead><tr><th>ID</th><th>名称</th><th>类型</th><th>Base URL</th><th>模型</th><th>环境变量</th><th>启用</th></tr></thead>
                    <tbody>
                    <tr th:each="provider : ${providers}">
                        <td th:text="${provider['id']}"></td>
                        <td th:text="${provider['name']}"></td>
                        <td th:text="${provider['provider_type']}"></td>
                        <td class="small" th:text="${provider['base_url']}"></td>
                        <td th:text="${provider['model']}"></td>
                        <td th:text="${provider['api_key_env']}"></td>
                        <td th:text="${provider['enabled']}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="panel mb-3">
                <h2 class="h5">保存 Provider</h2>
                <form method="post" th:action="@{/api-settings/provider}" class="vstack gap-2">
                    <input class="form-control" name="id" placeholder="已有 ID；留空则新增">
                    <input class="form-control" name="name" placeholder="名称">
                    <select class="form-select" name="providerType">
                        <option th:each="type : ${providerTypes}" th:value="${type.key}" th:text="${type.value}"></option>
                    </select>
                    <input class="form-control" name="baseUrl" placeholder="Base URL / Endpoint">
                    <input class="form-control" name="model" value="gpt-5.5" placeholder="模型">
                    <input class="form-control" name="apiKeyEnv" placeholder="API Key 环境变量">
                    <select class="form-select" name="authType"><option value="bearer">Bearer</option><option value="x-api-key">x-api-key</option><option value="api-key">api-key</option><option value="query_key">query key</option><option value="none">none</option></select>
                    <textarea class="form-control" name="extraHeadersJson" rows="2">{}</textarea>
                    <textarea class="form-control" name="requestTemplateJson" rows="5" placeholder="自定义 HTTP JSON 模板"></textarea>
                    <input class="form-control" name="responsePath" placeholder="choices.0.message.content">
                    <label class="form-check"><input class="form-check-input" type="checkbox" name="enabled" checked> 启用</label>
                    <button class="btn btn-primary">保存</button>
                </form>
            </div>
            <div class="panel">
                <h2 class="h5">测试调用</h2>
                <form method="post" th:action="@{/api-settings/test}" class="vstack gap-2">
                    <select class="form-select" name="providerId"><option th:each="p : ${providers}" th:value="${p['id']}" th:text="|#${p['id']} · ${p['name']} · ${p['model']}|"></option></select>
                    <input class="form-control" name="model" placeholder="临时模型">
                    <input class="form-control" type="password" name="apiKey" placeholder="临时 API Key">
                    <textarea class="form-control" name="prompt" rows="4">请用一句中文回答：API Provider 调用成功。</textarea>
                    <button class="btn btn-outline-primary">发送测试请求</button>
                </form>
            </div>
        </div>
    </div>
</section>
</html>
