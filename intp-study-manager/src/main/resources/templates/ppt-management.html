<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('PPT 与插问管理', ~{::section})}">
<section>
    <h1 class="h3 mb-3">PPT 与插问管理</h1>
    <div class="panel mb-3">
        <table class="table table-sm table-hover">
            <thead><tr><th>ID</th><th>状态</th><th>分类</th><th>排序</th><th>科目</th><th>标题</th><th>页数</th></tr></thead>
            <tbody>
            <tr th:each="deck : ${decks}">
                <td th:text="${deck['id']}"></td>
                <td th:text="${deck['status']}"></td>
                <td th:text="${deck['category']}"></td>
                <td th:text="${deck['sort_order']}"></td>
                <td th:text="${deck['subject']}"></td>
                <td><a th:href="@{/ppt-management(deckId=${deck['id']})}" th:text="${deck['title']}"></a></td>
                <td th:text="${deck['slide_count']}"></td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="panel mb-3" th:if="${activeDeckId != null}">
        <h2 class="h5">更新资料状态</h2>
        <form class="row g-2" method="post" th:action="@{/ppt-management/deck}">
            <input type="hidden" name="deckId" th:value="${activeDeckId}">
            <div class="col-md-3"><input class="form-control" name="category" placeholder="分类"></div>
            <div class="col-md-2"><input class="form-control" type="number" name="sortOrder" value="0"></div>
            <div class="col-md-3"><select class="form-select" name="status"><option>使用中</option><option>待整理</option><option>暂停</option><option>归档</option></select></div>
            <div class="col-md-2"><button class="btn btn-primary">保存</button></div>
        </form>
    </div>
    <div class="panel">
        <h2 class="h5">插问列表</h2>
        <table class="table table-sm">
            <thead><tr><th>页码</th><th>问题</th><th>答案</th><th>模型</th><th>状态</th></tr></thead>
            <tbody><tr th:each="q : ${questions}"><td th:text="${q['slide_number']}"></td><td th:text="${q['question']}"></td><td class="text-pre" th:text="${q['answer']}"></td><td th:text="${q['model']}"></td><td th:text="${q['status']}"></td></tr></tbody>
        </table>
    </div>
</section>
</html>
