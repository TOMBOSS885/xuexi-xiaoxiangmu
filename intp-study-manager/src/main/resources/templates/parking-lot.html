<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('探索停车场', ~{::section})}">
<section>
    <h1 class="h3 mb-3">探索停车场</h1>
    <div class="panel mb-3">
        <form class="row g-2" method="post" th:action="@{/parking-lot}">
            <div class="col-md-2"><input class="form-control" name="subject" placeholder="科目"></div>
            <div class="col-md-5"><input class="form-control" name="question" placeholder="问题"></div>
            <div class="col-md-3"><input class="form-control" name="source" placeholder="来源"></div>
            <div class="col-md-1"><select class="form-select" name="status"><option>未解决</option><option>处理中</option><option>已解决</option></select></div>
            <div class="col-md-1"><button class="btn btn-primary w-100">保存</button></div>
        </form>
    </div>
    <div class="panel">
        <table class="table table-sm">
            <thead><tr><th>状态</th><th>科目</th><th>问题</th><th>来源</th><th>更新</th></tr></thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td><span class="badge text-bg-secondary" th:text="${item['status']}"></span></td>
                <td th:text="${item['subject']}"></td>
                <td th:text="${item['question']}"></td>
                <td th:text="${item['source']}"></td>
                <td>
                    <form class="d-flex gap-1" method="post" th:action="@{/parking-lot/status}">
                        <input type="hidden" name="id" th:value="${item['id']}">
                        <select class="form-select form-select-sm" name="status"><option>未解决</option><option>处理中</option><option>已解决</option></select>
                        <button class="btn btn-sm btn-outline-primary">保存</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</html>
